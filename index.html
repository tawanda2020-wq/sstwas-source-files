<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SSTWAS - Self Service Till</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',system-ui,sans-serif;background:#F7F9FC;}</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div class="max-w-sm w-full text-center">
    <img src="assets/logo.png" alt="Store logo" class="h-14 mx-auto mb-4" onerror="this.style.display='none'" />
    <h1 class="text-2xl font-bold text-[#0D1B2A] mb-1">Self Service Till</h1>
    <p class="text-sm text-[#4A5568] mb-8">Scan. Pay. Go. Choose how you'd like to continue.</p>

    <div class="space-y-3">
      <a href="customer/index.html" class="block bg-[#1A73E8] text-white font-bold py-3 rounded-xl shadow hover:opacity-90 transition">
        🛒 I'm a Customer - Start Shopping
      </a>
      <a href="cashier/login.html" class="block bg-white border border-gray-200 text-[#0D1B2A] font-semibold py-3 rounded-xl shadow hover:bg-gray-50 transition">
        🧾 Cashier Login
      </a>
      <a href="admin/login.html" class="block bg-white border border-gray-200 text-[#0D1B2A] font-semibold py-3 rounded-xl shadow hover:bg-gray-50 transition">
        ⚙️ Admin Login
      </a>
    </div>

    <p class="text-xs text-gray-400 mt-8">...</p>
  </div>
</body>
</html>
