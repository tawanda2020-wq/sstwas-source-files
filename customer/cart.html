<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Cart - SSTWAS</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/customer.css" />
</head>
<body class="min-h-screen flex flex-col">

  <header class="flex items-center justify-between p-4">
  <a href="scanner.html" class="text-[#4A5568]">&larr;</a>
  <h1 class="font-semibold text-[#0D1B2A]">Your Cart</h1>
  <a href="../index.html" title="Home" class="text-[#4A5568]">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </a>
</header>

  <main id="cart-list" class="flex-1 px-4 space-y-3 overflow-y-auto"></main>

  <div id="empty-state" class="hidden flex-1 flex flex-col items-center justify-center text-center px-6">
    <p class="text-4xl mb-3">🛒</p>
    <p class="text-[#4A5568] mb-4">Your cart is empty.</p>
    <a href="scanner.html" class="btn-primary px-6 py-3">Scan a Product</a>
  </div>

  <footer class="p-4 border-t border-gray-200 bg-white">
    <div class="flex justify-between text-base font-bold text-[#0D1B2A] mb-3">
      <span>Total</span>
      <span id="cart-total">$0.00</span>
    </div>
    <button id="checkout-btn" class="btn-primary w-full py-3">Proceed to Checkout</button>
  </footer>

  <script type="module">
    import { getCart, removeItem, updateQty, getTotal } from "../js/cart.js";

    function render() {
      const items = getCart();
      const listEl = document.getElementById("cart-list");
      const emptyEl = document.getElementById("empty-state");
      const checkoutBtn = document.getElementById("checkout-btn");

      if (items.length === 0) {
        listEl.classList.add("hidden");
        emptyEl.classList.remove("hidden");
        checkoutBtn.disabled = true;
        checkoutBtn.classList.add("opacity-50");
      } else {
        listEl.classList.remove("hidden");
        emptyEl.classList.add("hidden");
        checkoutBtn.disabled = false;
        checkoutBtn.classList.remove("opacity-50");
      }

      listEl.innerHTML = items
  .map(
    (i) => `
  <div class="card p-3" data-id="${i.productId}">
    <div class="flex items-center justify-between">
      <div>
        <p class="font-semibold text-[#0D1B2A] text-sm">${i.name}</p>
        <p class="text-xs text-[#4A5568]">$${i.unitPrice.toFixed(2)} each · ${i.stock != null ? i.stock + ' in stock' : ''}</p>
      </div>
      <div class="flex items-center gap-2">
        <button class="qty-minus w-7 h-7 rounded-full bg-gray-100 font-bold">−</button>
        <span class="w-5 text-center text-sm font-semibold">${i.qty}</span>
        <button class="qty-plus w-7 h-7 rounded-full bg-gray-100 font-bold ${i.qty >= (i.stock || 999) ? 'opacity-30 cursor-not-allowed' : ''}">+</button>
        <span class="font-bold text-sm text-[#1A73E8] w-14 text-right">$${(i.qty * i.unitPrice).toFixed(2)}</span>
        <button class="remove-btn text-[#D32F2F] text-xs ml-1">✕</button>
      </div>
    </div>
    <p class="stock-warn hidden text-[10px] text-[#D32F2F] mt-1">Only ${i.stock} unit(s) available — cannot add more.</p>
  </div>`
  )
  .join("");

      document.getElementById("cart-total").textContent = `$${getTotal().toFixed(2)}`;

      listEl.querySelectorAll("[data-id]").forEach((row) => {
        const id = row.dataset.id;
        const item = items.find((i) => i.productId === id);
        row.querySelector(".qty-minus").addEventListener("click", () => {
          updateQty(id, item.qty - 1);
          render();
        });
        row.querySelector(".qty-plus").addEventListener("click", () => {
  const maxStock = item.stock || 999;
  if (item.qty >= maxStock) {
    // Show inline warning instead of letting them go over
    const warn = row.querySelector(".stock-warn");
    if (warn) { warn.classList.remove("hidden"); setTimeout(() => warn.classList.add("hidden"), 2000); }
    return;
  }
  updateQty(id, item.qty + 1);
  render();
});
        row.querySelector(".remove-btn").addEventListener("click", () => {
          removeItem(id);
          render();
        });
      });
    }

    document.getElementById("checkout-btn").addEventListener("click", () => {
      window.location.href = "checkout.html";
    });

    render();
  </script>
</body>
</html>
