<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Receipt — SSTWAS</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/customer.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="min-h-screen flex flex-col">

  <header class="flex items-center justify-center p-4 relative">
    <h1 class="font-semibold text-[#0D1B2A]">Receipt</h1>
  </header>

  <!-- Confirmed toast (shown briefly when arriving from a cash approval) -->
  <div id="confirmed-toast" class="hidden mx-4 mb-3 bg-green-50 border border-green-200 text-[#00C853] text-sm font-semibold rounded-xl p-3 text-center">
    ✅ Payment Confirmed! Your receipt is ready.
  </div>

  <main class="flex-1 px-4">
    <div id="receipt-container"></div>
  </main>

  <footer class="p-4 space-y-2">
    <button id="download-btn" class="btn-primary w-full py-3">⬇ Download Receipt</button>
    <a href="index.html" class="block text-center text-sm font-semibold text-[#4A5568] py-2">Done — New Shop</a>
  </footer>

  <script type="module">
    import { db } from "../js/firebase-config.js";
    import { ref, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
    import { renderReceipt, downloadReceiptImage } from "../js/receipt.js";
    import { clearCart } from "../js/cart.js";

    const params = new URLSearchParams(window.location.search);
    const txnId = params.get("txnId");
    const cameFromCash = params.get("confirmed") === "1";

    async function load() {
      if (!txnId) {
        document.getElementById("receipt-container").innerHTML =
          `<p class="text-center text-sm text-[#4A5568] mt-10">No transaction found.</p>`;
        return;
      }
      const snap = await get(ref(db, `transactions/${txnId}`));
      if (!snap.exists()) {
        document.getElementById("receipt-container").innerHTML =
          `<p class="text-center text-sm text-[#4A5568] mt-10">Transaction not found.</p>`;
        return;
      }
      const txn = snap.val();
      if (cameFromCash || txn.paymentMethod === "CASH") {
        document.getElementById("confirmed-toast").classList.remove("hidden");
      }
      await renderReceipt(txn, document.getElementById("receipt-container"));
      clearCart(); // cart only cleared once a receipt is actually shown
    }

    document.getElementById("download-btn").addEventListener("click", () => {
      downloadReceiptImage(`receipt-${txnId}.png`);
    });

    load();
  </script>
</body>
</html>
